site_name: Kay McNulty - Achei UnB

repo_url: https://github.com/FCTE-Qualidade-de-Software-1/2026-1_T01_KAY-McNULTY

theme:
  name: material
  features:
    - navigation.tabs # Abas na parte superior
    - navigation.sections
    - navigation.expand
    - content.code.copy # Botão de copiar nos blocos de código
  palette:
    # Modo claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    # Modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro

# Extensões úteis para documentação técnica de código e matemática
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

nav:
  - Início: index.md
  - EU1 - Fase 1:
      - Objetivo: fases/fase1/objetivo.md
      - Resultados Esperados: fases/fase1/resultados.md
      - Dados Brutos e Consolidados: fases/fase1/dados-brutos.md
      - Entregas: fases/fase1/entregas.md
  - EU2 - Fase 2:
      - Objetivos de Medição GQM: fases/fase2/gqm-objetivos.md
      - Métricas e Critérios: fases/fase2/metricas-criterios.md
      - Entregas: fases/fase2/entregas.md
  - EU2 - Fase 3:
      - Plano de Avaliação: fases/fase3/plano-avaliacao.md
      - Cronograma, Consistência e Referências: fases/fase3/cronograma-avaliacao.md
      - Entregas: fases/fase3/entregas.md
  - EU3 - Fase 4:
      - Coleta de Dados: fases/fase4/coleta-dados.md
      - Análise de Resultados: fases/fase4/analise-resultados.md
      - Entregas: fases/fase4/entregas.md
  

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
